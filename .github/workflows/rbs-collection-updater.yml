# Run `rbs collection update` and create Pull Request for rbs_collection.lock.yaml

on:
  workflow_call:
    inputs:
      assignees:
        description: PR assignees
        type: string
        required: false
      auto-merge:
        description: Whether set auto-marge to created PR
        type: boolean
        required: false
        default: false
      ruby-version:
        description: Passed to `ruby/setup-ruby`
        type: string
        required: false
        default: ruby

    secrets:
      app-id:
        description: GitHub App ID
        required: true
      private-key:
        description: GitHub App private key
        required: true
      slack-webhook:
        description: Slack incoming webhook url
        required: false

jobs:
  rbs-collection-updater:
    name: Update rbs_collection.lock.yaml

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - run: bundle exec rbs collection update

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.private-key }}
          permission-contents: write
          permission-pull-requests: write

      - uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        id: cpr
        with:
          token: ${{ steps.app-token.outputs.token }}
          committer: GitHub <noreply@github.com>
          title: "Update rbs_collection.lock.yaml"
          body: "Automated changes by [rbs-collection-updater](https://github.com/sue445/workflows/blob/main/.github/workflows/rbs-collection-updater.yml) GitHub action"
          commit-message: "Run `bundle exe rbs collection update`"
          labels: rbs-collection-updater
          branch: rbs-collection-updater
          branch-suffix: short-commit-hash
          assignees: ${{ inputs.assignees }}
          add-paths: |
            rbs_collection.lock.yaml

      - name: Enable auto-merge
        if: inputs.auto-merge && steps.cpr.outputs.pull-request-url
        run: |
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ steps.cpr.outputs.pull-request-url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Slack Notification (not success)
        uses: act10ns/slack@d96404edccc6d6467fc7f8134a420c851b1e9054 # v2.2.0
        if: "! success()"
        continue-on-error: true
        with:
          status: ${{ job.status }}
          webhook-url: ${{ secrets.slack-webhook }}
