on:
  workflow_call:
    inputs:
      before-command:
        description: Install command before `bundle install`
        type: string
        required: false
        default: ""
      bundle-without:
        description: Passed to `BUNDLE_WITHOUT` env
        type: string
        required: false
        default: ""
      ruby-version:
        description: Passed to `ruby/setup-ruby`
        type: string
        required: false
        default: ruby

    secrets:
      slack-webhook:
        description: Slack incoming webhook url
        required: false

jobs:
  pages-yard:
    name: Deploy yard to Pages

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Allow one concurrent deployment
    concurrency:
      group: pages
      cancel-in-progress: true

    runs-on: ubuntu-latest

    env:
      BUNDLE_WITHOUT: ${{ inputs.bundle-without }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Prepare for bundle install
        run: ${{ inputs.before-command }}
        if: inputs.before-command != ''

      - uses: ruby/setup-ruby@c4e5b1316158f92e3d49443a9d58b31d25ac0f8f # v1.306.0
        with:
          ruby-version: ${{ inputs.ruby-version }}
          bundler-cache: true

      - name: Generate yard
        run: bundle exec yard --output-dir "${DOC_DIR}"
        env:
          DOC_DIR: ${{ runner.temp }}/doc

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          # Upload entire repository
          path: ${{ runner.temp }}/doc

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0

      - name: Slack Notification (not success)
        uses: act10ns/slack@d96404edccc6d6467fc7f8134a420c851b1e9054 # v2.2.0
        if: "! success()"
        continue-on-error: true
        with:
          status: ${{ job.status }}
          webhook-url: ${{ secrets.slack-webhook }}
