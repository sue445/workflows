# Auto-merge Dependabot PR
# c.f. https://blog.smartbank.co.jp/entry/2023/02/16/dependabot-auto-merge-with-github-app

on:
  workflow_call:
    inputs:
      repo-name:
        description: repo name (e.g. user/repo)
        type: string
        required: true

    secrets:
      app-id:
        description: GitHub App ID
        required: true
      private-key:
        description: GitHub App private key
        required: true
      slack-webhook:
        description: Slack incoming webhook url
        required: false

jobs:
  dependabot-auto-merge:
    name: Auto-merge Dependabot PR

    runs-on: ubuntu-slim

    if: github.actor == 'dependabot[bot]' && github.repository == inputs.repo-name
    timeout-minutes: 13

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.app-id }}
          private-key: ${{ secrets.private-key }}
          permission-contents: write
          permission-pull-requests: write

      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ steps.app-token.outputs.token }}

      - name: Approve & enable auto-merge for Dependabot PR (patch version up)
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      # Now, development is only supported for bundler, composer, mix, maven, npm, pip
      # c.f. https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference#dependency-type-allow
      - name: Approve & enable auto-merge for Dependabot PR (minor version up && development dependencies)
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.dependency-type == 'direct:development'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Approve & enable auto-merge for Dependabot PR (minor version up && go_modules)
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.package-ecosystem == 'go_modules'
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      # Updates to ruby/setup-ruby often include the addition of new Ruby versions by bot
      - name: Approve & enable auto-merge for Dependabot PR (minor version up && github_actions && ruby/setup-ruby)
        if: steps.metadata.outputs.update-type == 'version-update:semver-minor' && steps.metadata.outputs.package-ecosystem == 'github_actions' && contains(steps.metadata.outputs.dependency-names, 'ruby/setup-ruby')
        run: |
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Slack Notification (not success)
        uses: act10ns/slack@d96404edccc6d6467fc7f8134a420c851b1e9054 # v2.2.0
        if: "! success()"
        continue-on-error: true
        with:
          status: ${{ job.status }}
          webhook-url: ${{ secrets.slack-webhook }}
